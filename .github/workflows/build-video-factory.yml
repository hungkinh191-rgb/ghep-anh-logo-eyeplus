name: Build Video Factory (Windows + Mac)

on:
  push:
    branches: [ main, master ]
    paths: [ "video-factory/**", ".github/workflows/build-video-factory.yml" ]
  workflow_dispatch:

jobs:
  # ============ WINDOWS: cua so app rieng (WebView2) + bo cai Setup.exe ============
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: video-factory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cai cong cu
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview pythonnet
      - name: Tai ffmpeg.exe (Windows)
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ff.zip
          Expand-Archive ff.zip -DestinationPath ff -Force
          $exe = Get-ChildItem -Recurse ff -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName bin/ffmpeg.exe -Force
      - name: Chuan bi font tieng Viet
        run: |
          try { Invoke-WebRequest -Uri "https://github.com/google/fonts/raw/main/ofl/bevietnampro/BeVietnamPro-SemiBold.ttf" -OutFile bin/font.ttf } catch { }
          if (-not (Test-Path bin/font.ttf) -or (Get-Item bin/font.ttf).Length -lt 50000) { Copy-Item C:\Windows\Fonts\arial.ttf bin/font.ttf -Force }
      - name: Dong goi app (--windowed, nhung WebView2)
        run: >
          pyinstaller --noconfirm --onedir --windowed --name VideoFactory
          --add-data "bin/ffmpeg.exe;bin"
          --add-data "bin/font.ttf;bin"
          --collect-all webview
          --collect-all clr_loader
          --copy-metadata pythonnet
          --hidden-import cgi
          app.py
      - name: Cai Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Tao bo cai Setup.exe
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss'
      - uses: actions/upload-artifact@v4
        with:
          name: VideoFactory-Windows-Setup
          path: video-factory/installer_out/VideoFactory-Setup.exe
          if-no-files-found: error

  # ============ MAC: cua so app rieng (WKWebView) trong .dmg ============
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: video-factory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cai cong cu
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview
      - name: Tai ffmpeg (macOS arm64)
        run: |
          mkdir -p bin
          curl -L -o bin/ffmpeg "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-darwin-arm64"
          chmod +x bin/ffmpeg
      - name: Chuan bi font tieng Viet
        run: |
          curl -L -o bin/font.ttf "https://github.com/google/fonts/raw/main/ofl/bevietnampro/BeVietnamPro-SemiBold.ttf" || true
          if [ ! -s bin/font.ttf ] || [ "$(stat -f%z bin/font.ttf)" -lt 50000 ]; then cp "/System/Library/Fonts/Supplemental/Arial Unicode.ttf" bin/font.ttf; fi
      - name: Dong goi app (.app, WKWebView)
        run: |
          pyinstaller --noconfirm --windowed --name VideoFactory \
            --add-data "bin/ffmpeg:bin" \
            --add-data "bin/font.ttf:bin" \
            --collect-all webview \
            --hidden-import cgi \
            app.py
      - name: Tao file .dmg
        run: hdiutil create -volname "Video Factory" -srcfolder "dist/VideoFactory.app" -ov -format UDZO "VideoFactory-Mac.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: VideoFactory-Mac-DMG
          path: video-factory/VideoFactory-Mac.dmg
          if-no-files-found: error
