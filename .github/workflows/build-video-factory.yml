name: Build Video Factory (Windows Portable)

# Tu chay khi day code video-factory len, hoac bam chay tay trong tab Actions.
on:
  push:
    branches: [ main, master ]
    paths: [ "video-factory/**", ".github/workflows/build-video-factory.yml" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: video-factory
    steps:
      - name: Lay code
        uses: actions/checkout@v4

      - name: Cai Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cai PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Tai ffmpeg.exe (ban Windows)
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ff.zip
          Expand-Archive ff.zip -DestinationPath ff -Force
          $exe = Get-ChildItem -Recurse ff -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName bin/ffmpeg.exe -Force
          Write-Host "ffmpeg.exe size:" (Get-Item bin/ffmpeg.exe).Length

      - name: Chuan bi font tieng Viet
        run: |
          try {
            Invoke-WebRequest -Uri "https://github.com/google/fonts/raw/main/ofl/bevietnampro/BeVietnamPro-SemiBold.ttf" -OutFile bin/font.ttf
          } catch { Write-Host "Tai font that bai, dung Arial cua Windows" }
          if (-not (Test-Path bin/font.ttf) -or (Get-Item bin/font.ttf).Length -lt 50000) {
            Copy-Item C:\Windows\Fonts\arial.ttf bin/font.ttf -Force
          }
          Write-Host "font.ttf size:" (Get-Item bin/font.ttf).Length

      - name: Dong goi bang PyInstaller (--onedir, portable)
        run: >
          pyinstaller --noconfirm --onedir --console --name VideoFactory
          --add-data "bin/ffmpeg.exe;bin"
          --add-data "bin/font.ttf;bin"
          --hidden-import cgi
          app.py

      - name: Them huong dan + nen zip
        run: |
          Copy-Item HUONG-DAN.md "dist/VideoFactory/HUONG-DAN.txt" -Force
          "Bam dup VideoFactory.exe de chay. Trinh duyet se tu mo.`r`nDe tat: dong cua so mau den." | Out-File -Encoding utf8 "dist/VideoFactory/DOC-TRUOC-KHI-CHAY.txt"
          Compress-Archive -Path dist/VideoFactory -DestinationPath VideoFactory-Windows.zip -Force
          Write-Host "Zip size:" (Get-Item VideoFactory-Windows.zip).Length

      - name: Tai ket qua len (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: VideoFactory-Windows-Portable
          path: video-factory/VideoFactory-Windows.zip
          if-no-files-found: error
