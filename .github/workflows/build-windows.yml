name: Build Windows Installer

# Tự chạy khi đẩy code lên, hoặc bấm chạy tay trong tab Actions.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Lấy code
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài công cụ đóng gói
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow tkinterdnd2

      - name: Đóng gói app bằng PyInstaller (--onedir)
        run: >
          pyinstaller --noconfirm --onedir --windowed
          --name "GhepAnhLogoEyePlus"
          --collect-all tkinterdnd2
          app.py

      - name: Cài Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Tạo bộ cài Setup.exe
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss'

      - name: Tải bộ cài lên (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: GhepAnhLogoEyePlus-Windows-Installer
          path: installer_out/GhepAnhLogoEyePlus-Setup.exe
          if-no-files-found: error
