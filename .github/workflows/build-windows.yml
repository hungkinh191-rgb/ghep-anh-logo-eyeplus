name: Build Windows EXE

# Tự chạy khi đẩy code lên, hoặc bấm chạy tay trong tab Actions.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Lấy code
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cài công cụ đóng gói
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow tkinterdnd2

      - name: Đóng gói thành .exe
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name "GhepAnhLogoEyePlus"
          --collect-all tkinterdnd2
          app.py

      - name: Tải file .exe lên (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: GhepAnhLogoEyePlus-Windows
          path: dist/GhepAnhLogoEyePlus.exe
          if-no-files-found: error
